<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Faba Coffee</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

header{
    padding:15px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    padding:10px;
    background:gold;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.container{
    padding:20px;
    display:grid;
    gap:20px;
}

.box{
    background:#1e1411;
    padding:15px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin:5px 0;
}

img{
    width:100px;
    margin:5px;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>ADMIN DASHBOARD</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">
<!-- SETTINGS -->
<div class="box">
    <h3>Admin Settings</h3>
    
    <label>Change Password</label>
    <input id="newPass" placeholder="New Password">
    
    <label>Change Cheat Code</label>
    <input id="newCheat" placeholder="New Cheat Code">
    
    <button onclick="saveSettings()">Save Settings</button>
    </div>
<!-- GALLERY EDIT -->
<div class="box">
<h3>Edit Gallery (Add Image URL)</h3>
<input id="galleryInput" placeholder="Image URL">
<button onclick="addGallery()">Add Image</button>
<div id="galleryPreview"></div>
</div>

<!-- ACHIEVEMENTS EDIT -->
<div class="box">
<h3>Edit Achievements</h3>
<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input id="img" placeholder="Image URL">
<button onclick="addAchievement()">Add Achievement</button>

<div id="achievementsPreview"></div>
</div>

</div>

<script>

// LOAD EXISTING DATA
let gallery = JSON.parse(localStorage.getItem("gallery")) || [];
let achievements = JSON.parse(localStorage.getItem("achievements")) || [];

// ADD GALLERY
function addGallery(){
    let img = document.getElementById("galleryInput").value;
    gallery.push(img);
    localStorage.setItem("gallery", JSON.stringify(gallery));
    render();
}

// ADD ACHIEVEMENT
function addAchievement(){
    let item = {
        title: document.getElementById("title").value,
        desc: document.getElementById("desc").value,
        img: document.getElementById("img").value
    };

    achievements.push(item);
    localStorage.setItem("achievements", JSON.stringify(achievements));
    render();
}

// RENDER
function render(){

document.getElementById("galleryPreview").innerHTML =
gallery.map(img => `<img src="${img}">`).join("");

document.getElementById("achievementsPreview").innerHTML =
achievements.map(a => `
    <div style="margin-top:10px;">
        <b>${a.title}</b>
        <p>${a.desc}</p>
        <img src="${a.img}">
    </div>
`).join("");

}

function logout(){
    window.location.href = "/";
}
render();
// LOAD SETTINGS FROM FLASK
async function loadSettings(){

const response = await fetch("/get-settings");
const settings = await response.json();

document.getElementById("newPass").value =
    settings.password;

document.getElementById("newCheat").value =
    settings.cheat_code;
}

// SAVE SETTINGS TO FLASK
async function saveSettings(){

const password =
    document.getElementById("newPass").value;

const cheat_code =
    document.getElementById("newCheat").value;

const response = await fetch("/save-settings",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        password:password,
        cheat_code:cheat_code
    })
});

const result = await response.json();

if(result.success){
    alert("✅ Settings Saved Successfully");
}
}

loadSettings();
</script>

</body>
</html>
