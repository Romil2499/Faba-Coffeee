<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faba Coffee</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#120d0b,#2b1d17);
    color:white;
}

/* HERO SECTION */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:url('images/coffee-bg.jpg') center/cover no-repeat;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
}

.hero h1{
    font-size:60px;
    z-index:1;
    margin:0;
    letter-spacing:2px;
}

.hero p{
    z-index:1;
    font-size:20px;
    opacity:0.9;
}

/* HEADER */
header{
  width: 1300px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top: 10px;
    padding-left: 900px;
    position:fixed;
    top:0;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
}

.logo{
    width:80px;
}

.navbar{
    list-style:none;
    display:flex;
    gap:20px;
}

.navbar a{
    text-decoration:none;
    color:#f5d6b4;
    font-weight:bold;
}

/* MAIN */
main{
    padding:80px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:80px;
}

/* 3D CARDS */
.content{
    width:400px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    padding:25px;
    text-align:center;

    opacity:0;
    transform:translateY(120px) rotateX(60deg);
    filter:blur(6px);
    transition:all 0.9s ease;
}

/* SHOW ON SCROLL */
.content.show{
    opacity:1;
    transform:translateY(0) rotateX(0deg);
    filter:blur(0);
}

/* HOVER */
.content:hover{
    transform:scale(1.05);
}

img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

button{
    margin-top:10px;
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#c48a4a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#a86f35;
}

video{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}
.admin-btn{
    background:#ff4d4d;
    padding:6px 12px;
    border-radius:6px;
    color:white !important;
    font-weight:bold;
    transition:0.3s;
}

.admin-btn:hover{
    color: #2b1d17;
    transform:scale(1.1);
}
</style>
</head>

<body>
<!-- ADMIN LOGIN MODAL -->
<div id="adminModal" style="
display:none;
border-radius: 20px;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:999;
">

<div style="
background:#1e1411;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
">

<h2>Admin Login</h2>

<input id="email" placeholder="Email" style="padding:10px;width:90%;margin:5px;border-radius: 10px;">
<input id="password" type="password" placeholder="Password" style="padding:10px;width:90%;margin:5px;border-radius: 10px;">

<br>
<button onclick="adminLogin()">Login</button>

<p id="adminError" style="color:rgb(199, 2, 2);"></p>

</div>
</div>
<!-- HERO -->
<div class="hero">
    <h1>WELCOME TO FABA COFFEE</h1>
    <p>Brewing the best version of you ☕</p>
    
</div>

<!-- HEADER -->
<header>
   

    <nav>
        <ul class="navbar">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="achievements.html">Achievements</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="#" onclick="openAdmin()">Admin</a></li>
        </ul>
    </nav>
</header>

<!-- CONTENT -->
<main>

    <div class="content">
        <h2>About FABA</h2>
        <p>Your friendly neighborhood barista that inspires daily growth.</p>
    </div>

    <div class="content">
        <h2>Menu</h2>
       
        <a href="https://www.messenger.com/t/100764371755825" target="_blank"><button>Order Now</button></a>
        <a href="https://www.instagram.com/faba.coffee/" target="_blank"><button>Follow Us</button></a>   
    </div>

    <div class="content">
        <h2>Interview</h2>
        <video src="videos/interview.mp4" controls></video>
    </div>

</main>

<script>
const cards = document.querySelectorAll(".content");

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{threshold:0.2});

cards.forEach(card=>{
    observer.observe(card);
});

function openAdmin(){
    document.getElementById("adminModal").style.display="flex";
}
async function adminLogin(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

const response = await fetch("/login",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        email:email,
        password:pass
    })
});

const result = await response.json();

if(result.success){
    window.location.href = "maze.html";
}else{
    document.getElementById("adminError").innerHTML =
    "❌ Wrong Email or Password";
}
}
</script>

</body>
</html>
